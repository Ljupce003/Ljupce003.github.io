<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse all of Ljupce's projects — web apps, tools, and experiments." />
  <title>Projects — Ljupce's Portfolio</title>

  <link rel="icon" id="favicon-main" type="image/svg+xml" href="../Assets/favicon/favicon.svg">

  <!--    <link rel="alternate icon" href="Assets/favicon/favicon.ico">-->
  <link rel="apple-touch-icon" href="../Assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="../Assets/favicon/site.webmanifest">

  <link href="../Assets/css/output.css" rel="stylesheet">
  <script>


    function updateFavicons(isLight) {
      const link = document.getElementById('favicon-main');
      if (!link) return;

      const suffix = isLight ? '-light' : '';
      const newHref = `../Assets/favicon/favicon${suffix}.svg`;

      // 1. Log to verify (as you were doing)
      console.log(`Switching favicon to: ${newHref}`);

      // 2. The "Force Refresh" Trick:
      // We clone the node, change the href, and replace the old one.
      const newLink = link.cloneNode(true);
      newLink.setAttribute('href', newHref);
      link.parentNode.replaceChild(newLink, link);
    }

    // 3. Listen for System Theme changes while the page is open
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      updateFavicons(e.matches);
    });

    // 4. Initial check
    window.addEventListener('DOMContentLoaded', () => {
      updateFavicons(window.matchMedia('(prefers-color-scheme: dark)').matches);
    });
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #060d1f; }
    .badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .nav-link { transition: color 0.2s; }
    .nav-link:hover { color: #818cf8; }
    article { position: relative; }
    .stretched-link::after { position: absolute; inset: 0; content: ''; z-index: 1; }
  </style>
</head>
<body class="font-sans text-slate-100 min-h-screen flex flex-col">

{{nav}}

  <!-- Page Header -->
  <header class="max-w-5xl mx-auto w-full px-6 pt-16 pb-10">
    <p class="text-indigo-400 font-semibold text-sm tracking-widest uppercase mb-3">My Work</p>
    <h1 class="text-4xl font-extrabold text-white mb-4">Projects</h1>
    <p class="text-slate-400 text-lg max-w-xl">
      A collection of things I've built — from academic coursework to personal experiments.
    </p>
  </header>

  <!-- Projects Grid -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-6 pb-20">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6">
      {{projectCards}}
    </div>
  </main>

{{footer}}

</body>
</html>
