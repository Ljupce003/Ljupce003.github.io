<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse all of Ljupce's projects — web apps, tools, and experiments." />
  <title>Projects — Ljupce's Portfolio</title>

  <link rel="icon" id="favicon-main" type="image/svg+xml" href="../Assets/favicon/favicon.svg">
  <link rel="apple-touch-icon" href="../Assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="../Assets/favicon/site.webmanifest">

  <link rel="prefetch" as="image" href="../Assets/images/logo-hover.png">
  <link rel="prefetch" as="image" href="../Assets/images/portrait.JPG">
  <link rel="prefetch" as="image" href="../Assets/images/finki-logo-short.png">
  <link rel="prefetch" as="image" href="../Assets/images/ksb-logo.jpg">

  <link href="../Assets/css/output.css" rel="stylesheet">

  <script>

    // 2. Anti-Flash & System Theme Check
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    function updateFavicons(isLight) {
      const link = document.getElementById('favicon-main');
      if (!link) return;

      const suffix = isLight ? '-light' : '';
      const newHref = `../Assets/favicon/favicon${suffix}.svg`;

      const newLink = link.cloneNode(true);
      newLink.setAttribute('href', newHref);
      link.parentNode.replaceChild(newLink, link);
    }

    // Listen for System Theme changes while the page is open
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      updateFavicons(e.matches);
    });

    // Initial check
    window.addEventListener('DOMContentLoaded', () => {
      updateFavicons(window.matchMedia('(prefers-color-scheme: dark)').matches);
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>

    .stretched-link::after { position: absolute; inset: 0; content: ''; z-index: 1; }

</head>

{{footer}}


<script>
  document.addEventListener('DOMContentLoaded', () => {
    const demoBtns = document.querySelectorAll('.smart-demo-btn');

    async function checkDemoStatus(btn) {
      const urlsAttr = btn.getAttribute('data-demo-urls');
      if (!urlsAttr) return;

      try {
        const urls = JSON.parse(urlsAttr.replace(/&quot;/g, '"'));
        let workingUrl = null;

        for (const url of urls) {
          try {
            // STEP 1: Try a normal fetch
            const response = await fetch(url, {cache: 'no-store'});
            if (response.ok) {
              console.log(url,"works")
              workingUrl = url;
              break;
            }
          } catch (e) {
            // STEP 2: If Step 1 failed (likely CORS), try 'no-cors'
            // This is a "blind" check. If this succeeds, the server is ALIVE
            try {
              const no_cors_response = await fetch(url, { mode: 'no-cors', cache: 'no-store' });
              if(no_cors_response.ok){
                workingUrl = url;
                break;
              }

            } catch (noCorsError) {
              console.warn(`[SmartLink] ${url} is truly unreachable.`);
            }
          }
        }

        const dot = btn.querySelector('.status-dot');
        const ping = btn.querySelector('.status-ping');

        if (workingUrl) {
          btn.href = workingUrl;
          btn.style.pointerEvents = 'auto';
          btn.classList.remove('opacity-50', 'grayscale');
          if (ping) ping.remove();
          if (dot) dot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500 status-dot transition-colors duration-500';
        } else {
          btn.href = 'javascript:void(0)';
          btn.style.pointerEvents = 'none';
          btn.classList.add('opacity-50', 'grayscale');
          if (ping) ping.remove();
          if (dot) dot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500 status-dot transition-colors duration-500';
        }
      } catch (err) {
        console.error("Parse error", err);
      }
    }

    // 1. Run immediately on page load
    demoBtns.forEach(checkDemoStatus);

    // 2. Run again every 30 seconds (30000 milliseconds)
    setInterval(() => {
      demoBtns.forEach(checkDemoStatus);
    }, 30000);
  });
</script>
</body>
</html>
