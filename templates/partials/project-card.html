<article class="group relative flex flex-col bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-6 hover:border-indigo-500/50 hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
    <div class="flex items-start justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-900 dark:text-white group-hover:text-indigo-600 dark:group-hover:text-indigo-300 transition-colors leading-snug pr-4">
            <a href="{{slug}}.html" class="stretched-link focus:outline-none">
                {{title}}
            </a>
        </h2>
        <a href="{{github}}" target="_blank" rel="noopener noreferrer"
           class="relative z-10 shrink-0 text-slate-400 hover:text-slate-900 dark:text-slate-500 dark:hover:text-white transition-colors" title="View on GitHub">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
            </svg>
        </a>
    </div>

    <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-5 flex-1">{{description}}</p>

    <div class="flex flex-wrap gap-1.5 mb-5">
        {{badges}}
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-slate-100 dark:border-slate-700/50 relative z-10">
        <a href="{{slug}}.html"
           class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 dark:hover:text-indigo-300 transition-colors text-sm font-semibold flex items-center gap-1">
            View Details
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
            </svg>
        </a>
        {{demoLink}}
    </div>
</article>
