<nav class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-navy-950/80 backdrop-blur-md sticky top-0 z-50 focus:outline-none transition-colors duration-300">
  <div class="max-w-5xl mx-auto px-4 h-20 flex items-center justify-between">
    <a href="{{rootPath}}index.html" class="flex items-center gap-2">
      <img src="{{rootPath}}Assets/images/logo-transparent.png" alt="Logo" class="w-16 h-16 object-contain dark:invert-0 invert transition-all"/>
    </a>

    <div class="flex items-center gap-6 text-sm font-medium text-slate-600 dark:text-slate-300">
      <a href="{{rootPath}}index.html" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors {{activeHome}} focus:outline-none ">Home</a>
      <a href="{{rootPath}}about.html" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors {{activeAbout}} focus:outline-none ">About</a>
      <a href="{{projectsIndexPath}}" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors {{activeProjects}} focus:outline-none ">Projects</a>

      <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none">
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>
  </div>
</nav>

<script>
  const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
  const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

  // 1. Initialize Theme and Favicon
  const isDark = localStorage.getItem('color-theme') === 'dark' ||
          (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

  function applyTheme(dark) {
    if (dark) {
      document.documentElement.classList.add('dark');
      themeToggleLightIcon.classList.remove('hidden'); // Show sun
      themeToggleDarkIcon.classList.add('hidden');    // Hide moon
    } else {
      document.documentElement.classList.remove('dark');
      themeToggleDarkIcon.classList.remove('hidden'); // Show moon
      themeToggleLightIcon.classList.add('hidden');    // Hide sun
    }
  }

  applyTheme(isDark);

  // 2. The Toggle Logic
  const themeToggleBtn = document.getElementById('theme-toggle');

  themeToggleBtn.addEventListener('click', function() {
    const willBeDark = !document.documentElement.classList.contains('dark');
    localStorage.setItem('color-theme', willBeDark ? 'dark' : 'light');
    applyTheme(willBeDark);
  });
</script>
