<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{metaDescription}}" />
  <title>{{title}} — Ljupce's Portfolio</title>

  <link rel="icon" id="favicon-main" type="image/svg+xml" href="../Assets/favicon/favicon.svg">
  <link rel="apple-touch-icon" href="../Assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="../Assets/favicon/site.webmanifest">

  <link href="../Assets/css/output.css" rel="stylesheet">

  <script>
    // 1. Anti-Flash & System Theme Check
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    function updateFavicons(isLight) {
      const link = document.getElementById('favicon-main');
      if (!link) return;
      const suffix = isLight ? '-light' : '';
      const newHref = `../Assets/favicon/favicon${suffix}.svg`;

      const newLink = link.cloneNode(true);
      newLink.setAttribute('href', newHref);
      link.parentNode.replaceChild(newLink, link);
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      updateFavicons(e.matches);
    });

    window.addEventListener('DOMContentLoaded', () => {
      updateFavicons(window.matchMedia('(prefers-color-scheme: dark)').matches);
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* Clean up hardcoded colors to allow Tailwind toggle */
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .btn-primary { transition: all 0.2s; }
    .btn-primary:hover { background-color: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
  </style>
</head>

<body class="font-sans bg-slate-50 dark:bg-navy-950 text-slate-600 dark:text-slate-400 min-h-screen flex flex-col transition-colors duration-300">

{{nav}}

  <div class="border-t border-slate-200 dark:border-slate-800 mb-12"></div>

  <section>

</main>

{{footer}}

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const demoBtns = document.querySelectorAll('.smart-demo-btn');

    async function checkDemoStatus(btn) {
      const urlsAttr = btn.getAttribute('data-demo-urls');
      if (!urlsAttr) return;

      try {
        const urls = JSON.parse(urlsAttr.replace(/&quot;/g, '"'));
        let workingUrl = null;

        for (const url of urls) {
          try {
            const response = await fetch(url, {cache: 'no-store'});
            if (response.ok) {
              workingUrl = url;
              break;
            }
          } catch (e) {
            try {
              const no_cors_response = await fetch(url, { mode: 'no-cors', cache: 'no-store' });
              if(no_cors_response.ok){
                workingUrl = url;
                break;
              }

            } catch (noCorsError) {
              console.warn(`[SmartLink] ${url} is unreachable.`);
            }
          }
        }

        const dot = btn.querySelector('.status-dot');
        const ping = btn.querySelector('.status-ping');

        if (workingUrl) {
          btn.href = workingUrl;
          btn.style.pointerEvents = 'auto';
          btn.classList.remove('opacity-50', 'grayscale');
          if (ping) ping.classList.add('hidden'); // Hide so we can un-hide if it goes down later
          if (dot) dot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500 status-dot transition-colors duration-500';
        } else {
          btn.href = 'javascript:void(0)';
          btn.style.pointerEvents = 'none';
          btn.classList.add('opacity-50', 'grayscale');
          if (ping) ping.classList.remove('hidden');
          if (dot) dot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500 status-dot transition-colors duration-500';
        }
      } catch (err) {
        console.error("Status parse error", err);
      }
    }

    demoBtns.forEach(checkDemoStatus);
    setInterval(() => demoBtns.forEach(checkDemoStatus), 30000);
  });
</script>
</body>
</html>
