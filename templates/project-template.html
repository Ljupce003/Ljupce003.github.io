<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{metaDescription}}" />
  <title>{{title}} — Ljupce's Portfolio</title>
  <link rel="icon" href="../Images/logo-transparent.png" type="image/png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            navy: { 950: '#060d1f', 900: '#0a1128', 800: '#0f1a38', 700: '#162040' }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #060d1f; }
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .nav-link { transition: color 0.2s; }
    .nav-link:hover { color: #818cf8; }
    .btn-primary { transition: all 0.2s; }
    .btn-primary:hover { background-color: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
    .btn-outline { transition: all 0.2s; }
    .btn-outline:hover { background-color: rgba(99,102,241,0.1); border-color: #818cf8; transform: translateY(-1px); }
  </style>
</head>
<body class="font-sans text-slate-100 min-h-screen flex flex-col">

{{nav}}

  <!-- Main Content -->
  <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-16">

    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 text-sm text-slate-500 mb-10">
      <a href="../index.html" class="hover:text-indigo-400 transition-colors">Home</a>
      <span>/</span>
      <a href="index.html" class="hover:text-indigo-400 transition-colors">Projects</a>
      <span>/</span>
      <span class="text-slate-300">{{title}}</span>
    </div>

    <!-- Project Header -->
    <header class="mb-12">
      <h1 class="text-4xl font-extrabold text-white mb-4 leading-tight">{{title}}</h1>
      <p class="text-lg text-slate-300 leading-relaxed">{{description}}</p>
    </header>

    <!-- Technologies -->
    <section class="mb-12">
      <h2 class="text-sm font-semibold uppercase tracking-widest text-slate-500 mb-4">Technologies Used</h2>
      <div class="flex flex-wrap gap-2">
        {{technologies}}
      </div>
    </section>

    <!-- Divider -->
    <div class="border-t border-slate-800 mb-12"></div>

    <!-- Links -->
    <section>
      <h2 class="text-sm font-semibold uppercase tracking-widest text-slate-500 mb-6">Links</h2>
      <div class="flex flex-wrap gap-4">
        <a href="{{github}}" target="_blank" rel="noopener noreferrer"
           class="btn-primary inline-flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold text-sm">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
          </svg>
          View on GitHub
        </a>
        {{demoLink}}
      </div>
    </section>

  </main>

{{footer}}

</body>
</html>
